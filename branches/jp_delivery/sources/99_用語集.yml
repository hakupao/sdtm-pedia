- name: 2_採用根拠
  type: table
  content_summary: 各用語の採用根拠 (reason 要約 ≤200 字)
  note_rows: [0]
  headers:
  - 英
  - 日
  - 採用根拠
  rows:
  - - 【注意書き】
    - ※ 本表の「採用根拠」列は内部用語の選定理由を説明する目的で作成した. 鉤括弧「」内に引用されている語は使用禁止語 (内部専用) であり, 納品物本文では一切使用しない.
    - ''
  - - round
    - 実施回
    - JIS X 0160:2021 / 共通フレーム 2013 で「フェーズ」は工程区分で定着 → iteration 意味と不整合. 「回次」は会議用語で IT 不適. 「実施回」は IPA 要件定義ガイド §要件定義マネジメント の用法と整合,
      平易.
  - - batch
    - 処理単位
    - 「一括処理」は IPA 機能要件合意形成ガイドの「バッチ処理」訳だが本プロジェクト用法 (作業分割単位) と異なる. 「処理単位」は IPA 非機能要求グレード §性能・拡張性 の単位概念と整合.
  - - kickoff
    - 着手指示
    - 「開始宣言」は儀礼的, 「工程開始」は工程全体と混同, 「起動指示」はシステム起動と混同. 「着手指示」は IPA モデル契約書 §プロジェクト管理義務 で「着手」が開発開始行為として明示.
  - - handoff
    - 工程間引渡し
    - 「引継ぎ」は人事業務継続用語で IT 工程に意味が広すぎ. 「受渡し」は契約上の納品行為に特化. 「工程間引渡し」は JIS X 0160:2021 §プロセスインタフェース で工程間入出力関係として記述.
  - - cut
    - 版確定
    - 「確定版」は名詞 (成果物), 「リリース基点」はカタカナ含む. 「版確定」は IPA モデル契約書 §重要事項説明書・版管理 と CSV ガイドライン §変更の管理 と整合.
  - - multi-session
    - 複数班並列作業
    - 「並列処理体制」は IT 並列実行と混同. 「分散」はネットワーク分散の含意. 「複数班並列作業」は IPA 非機能要求グレード §運用・保守性 + 共通フレーム §合意プロセス と整合.
  - - reconciler
    - 整合確認担当者
    - 「突合」は財務会計の数値照合語感. 「整合検証者」は QA 役職と混同. 「整合確認担当者」は CSV ガイドライン §変更の管理 で整合性確認が担当者単位で記録される旨に整合.
  - - writer
    - 文書作成担当者
    - 「作成者」は範囲不明確 (設計者・実装者も該当しうる). 「起草担当者」は法的文書語感. 「文書作成担当者」は IPA 要件定義ガイド §要件定義書の作成担当者 で明示.
  - - reviewer
    - 文書確認担当者
    - 「査読担当者」は学術 peer review 語感. 「確認責任者」は階層的誤解. 「文書確認担当者」は IPA 要件定義ガイド §レビュー担当者 + JIS X 0160 §確認プロセス と直接対応.
  - - subagent
    - 実行担当者
    - '★ F-6 修正注記: 「subagent」(使用禁止語) 自体は AI 開発手法の内部概念で JIS / IPA / CSV ガイドラインに該当語なし. 訳語選定根拠として JIS X 0160 §6.4.7 実装プロセス +
      共通フレーム §2 テクニカルプロセスの 「実行」役割概念を借用適用. 「処理担当プロセス」は曖昧 (組織 vs IT). 「下位担当者」は階層強調すぎ. 「実行担当者」は 「writer」(使用禁止語)…'
  - - atom
    - 検証単位
    - CJUG SDTM v1.4 §2.1 の「データセット/レコード」階層と区別必要 (「atom」(使用禁止語) はレコード以下の検証粒度). 「データ単位」「記録単位」は ER/ES や SDTM 階層と混同リスク. 「検証単位」は
      CSV ガイドライン §バリデーション と整合.
  - - ledger
    - 検証台帳
    - 「検証記録簿」は ER/ES「監査証跡」と語感重複. 「管理台帳」は文書管理慣用で検証特化が薄れる. 「検証台帳」は CSV ガイドライン「システム台帳」の医薬品 IT 文脈定着度を援用.
  - - evidence
    - 根拠資料
    - 「エビデンス」はカタカナ禁止. 「検証証跡」は ER/ES §2「監査証跡 (Audit Trail)」と概念衝突. 「根拠資料」は IPA 機能要件合意形成ガイドで要件根拠文書として使用実績.
  - - drift
    - 乖離
    - 「逸脱」は CSV ガイドライン「手順書からの逸脱」固有用法と衝突. 「差異」は経時的ずれを表現不足. 「ずれ」はひらがなで JIS Z 8301 §規格票作成規則 に不適切. 「乖離」は共通フレーム + IPA 要件定義ガイドの「期待値と実績の乖離」と整合.
  - - dropout
    - 対象外項目
    - '★ 重要衝突: 臨床試験文脈では 「dropout」(使用禁止語) = 被験者脱落・中止. SDTMIG v3.2 では §DS ドメイン (Disposition Event, 第 6 章 一般オブザベーションクラス Events
      系) の DSDECOD 制御用語に "DROPPED OUT" 等が登録. 本プロジェクト用法 (抽出項目除外) と全く異なる. 「除外項目」は GxP「除外基準 (Exclusi…'
  - - progress.json
    - 進捗管理ファイル
    - 「進行状況記録」は文書管理語との統一感薄れ. 「状態管理ファイル」は CSV システム状態と混同. 「進捗管理」は共通フレーム §プロジェクト管理 + IPA モデル契約書 §進捗報告 で標準語.
  - - worklog
    - 作業記録
    - 「作業ログ」はカタカナ含む. 「業務日誌」は日常語感. 「作業履歴」は事後集約の語感, リアルタイム不適. 「作業記録」は IPA モデル契約書 §プロジェクト文書体系 で使用, ER/ES「監査証跡」と区別.
  - - Rule D
    - 審査独立性原則
    - 「利益相反回避原則」は ICH E6 / 法曹会計の特化語で粒度違い. 「独立審査規則」は法令用語と混同. 「審査独立性原則」は CSV ガイドライン §供給者アセスメント + JIS X 0160 §検証プロセス独立性要件 と整合.
  - - PASS 四条
    - 合格判定基準
    - 厚労省 CSV ガイドライン §5 で IQ/OQ/PQ 判定について「合格判定基準」が標準語. 「受入判定基準」は受入試験文脈に特化過ぎ. 「適合判定基準」は ISO 認証文脈で混同リスク.
  - - PASS 五条
    - 合格判定基準
    - PASS 四条と同一カテゴリ. 用語監査条件追加版だが外部文書での条件数明示は混乱を招くため統一.
  - - Tier 1
    - 公開不要 (内部分類)
    - 「Tier 1」(使用禁止語)/2/3 は内部工程規模分類, 納品物に記載する設計概念ではない. JIS X 0160:2021 §6.4 テーラリング / 共通フレーム 2013 にも三分類対応の公式語は存在しない.
  - - Tier 2
    - 公開不要 (内部分類)
    - 「Tier 1」(使用禁止語) と同一判断. 「標準工程」は規格根拠なし. 「中規模工程」は形容語.
  - - Tier 3
    - 公開不要 (内部分類)
    - 「Tier 1」(使用禁止語)/2 と同一判断. 「高度管理工程」は規格根拠なし造語.
  - - chain
    - 変更連鎖
    - 「相互参照」は双方向参照のみで「更新時の同期義務」動的側面欠落. 「関連文書連動」は規格根拠なし造語. 「変更連鎖」は IPA モデル契約書「変更管理」+「連鎖」概念で正確.
  - - gate
    - 工程移行判定
    - 「工程審査」は審査行為で合否判定の関門意味が不明確. 「マイルストン審査」はカタカナ含む. 「工程移行判定」は共通フレーム §プロセスレビュー + JIS X 0160 §7 移行基準 と整合.
  - - ack
    - 承認
    - 「確認」は事実認知を指し意思決定意味なし. 「了承」は商慣行的, 公文書では「承認」優先. 「承認」は CSV ガイドライン §6.6 変更管理 + IPA モデル契約書 §承認欄 で標準語.
  - - だいたい
    - 文脈依存
    - '文化庁「公用文作成の考え方」(2022) §専門用語の扱い + である調統一 で口語表現は不適. 数値: 「約」/ 範囲・期間: 「概ね」/ 手順・内容要約: 「概略として」と使い分け.'
  - - ちゃんと
    - 文脈依存
    - '文化庁「公用文作成の考え方」(2022) で様態副詞は技術文書で具体性欠く語として回避. 方法妥当性: 「適切に」/ 数値内容誤りなし: 「正確に」/ 実行完了保証: 「確実に」と使い分け.'
  - - ざっくり
    - 文脈依存
    - '公用文 (2022) §読み手が正確に理解できる語 原則に反する. 精度低さを含意し信頼性にマイナス. 全体像: 「概要として」/ 細部捨象: 「大まかに」/ 詳細圧縮: 「要約すると」と使い分け.'
  - - いい感じ
    - 文脈依存
    - '公用文 (2022) §である調統一 + 専門用語の扱い から最も不適切な主観評価語. 品質基準達成: 「良好な状態」/ 閾値妥当: 「適切な水準」/ 期待値一致: 「期待どおりの結果」と使い分け.'
  - - アトム
    - 検証単位
    - 'カタカナ直訳禁止 (硬約束 H-1). 「atom」(使用禁止語) エントリと統一: 「検証単位」.'
  - - レジャー
    - 検証台帳
    - 'カタカナ直訳禁止 + 日本語「「レジャー」(使用禁止語)」は通常 "leisure (余暇)" の定着訳語のため致命的混乱リスク. 「ledger」(使用禁止語) エントリと統一: 「検証台帳」.'
  - - サブエージェント
    - 実行担当者
    - 'カタカナ直訳禁止. 「subagent」(使用禁止語) エントリと整合: 「実行担当者」. Cross-「batch」(使用禁止語) reconciliation: 「Batch」(使用禁止語) 2 「専門担当エージェント」案を不採用
      ((1) sibling pattern 統一 「writer」(使用禁止語)=文書作成担当者/「reviewer」(使用禁止語)=文書確認担当者 (2) カタカナ「エージェント」回避).'
- name: 3_候補参考
  type: table
  content_summary: 採用候補一覧と不採用理由
  note_rows: [0]
  headers:
  - 英
  - 採用候補 (3 種)
  - 不採用理由
  rows:
  - - 【注意書き】
    - ※ 本表の「採用候補」「不採用理由」列は内部用語の候補選定根拠を説明する目的で作成した. 鉤括弧「」内に引用されている語は使用禁止語 (内部専用) であり, 納品物本文では一切使用しない.
    - ''
  - - round
    - 回次 / フェーズ / 作業サイクル / 実施回
    - '不採用候補: 「回次」・「フェーズ」・「作業サイクル」. 根拠: JIS X 0160:2021 / 共通フレーム 2013 で「フェーズ」は工程区分で定着 → iteration 意味と不整合. 「回次」は会議用語で IT 不適.
      「実施回」は IPA 要件定義ガイド §要件定義マネジメント の用法と…'
  - - batch
    - 一括処理 / 処理単位 / 作業束 / 処理群
    - '不採用候補: 「一括処理」・「作業束」・「処理群」. 根拠: 「一括処理」は IPA 機能要件合意形成ガイドの「バッチ処理」訳だが本プロジェクト用法 (作業分割単位) と異なる. 「処理単位」は IPA 非機能要求グレード §性能・拡張性
      の単位概念と整合.'
  - - kickoff
    - 開始宣言 / 着手指示 / 工程開始 / 起動指示
    - '不採用候補: 「開始宣言」・「工程開始」・「起動指示」. 根拠: 「開始宣言」は儀礼的, 「工程開始」は工程全体と混同, 「起動指示」はシステム起動と混同. 「着手指示」は IPA モデル契約書 §プロジェクト管理義務 で「着手」が開発開始行為として明示.'
  - - handoff
    - 引継ぎ / 成果物移管 / 工程間引渡し / 受渡し
    - '不採用候補: 「引継ぎ」・「成果物移管」・「受渡し」. 根拠: 「引継ぎ」は人事業務継続用語で IT 工程に意味が広すぎ. 「受渡し」は契約上の納品行為に特化. 「工程間引渡し」は JIS X 0160:2021 §プロセスインタフェース
      で工程間入出力関係として記述.'
  - - cut
    - 版確定 / 版締め / 確定版 / リリース基点
    - '不採用候補: 「版締め」・「確定版」・「リリース基点」. 根拠: 「確定版」は名詞 (成果物), 「リリース基点」はカタカナ含む. 「版確定」は IPA モデル契約書 §重要事項説明書・版管理 と CSV ガイドライン §変更の管理
      と整合.'
  - - multi-session
    - 複数班並列作業 / 分散並行実施 / 並列処理体制 / 多班同時実施
    - '不採用候補: 「分散並行実施」・「並列処理体制」・「多班同時実施」. 根拠: 「並列処理体制」は IT 並列実行と混同. 「分散」はネットワーク分散の含意. 「複数班並列作業」は IPA 非機能要求グレード §運用・保守性 + 共通フレーム
      §合意プロセス と整合.'
  - - reconciler
    - 整合確認担当者 / 突合担当者 / 照合責任者 / 整合検証者
    - '不採用候補: 「突合担当者」・「照合責任者」・「整合検証者」. 根拠: 「突合」は財務会計の数値照合語感. 「整合検証者」は QA 役職と混同. 「整合確認担当者」は CSV ガイドライン §変更の管理 で整合性確認が担当者単位で記録される旨に整合.'
  - - writer
    - 文書作成担当者 / 起草担当者 / 作成者 / 文書作成プロセス担当
    - '不採用候補: 「起草担当者」・「作成者」・「文書作成プロセス担当」. 根拠: 「作成者」は範囲不明確 (設計者・実装者も該当しうる). 「起草担当者」は法的文書語感. 「文書作成担当者」は IPA 要件定義ガイド §要件定義書の作成担当者
      で明示.'
  - - reviewer
    - 査読担当者 / 文書確認担当者 / 審査担当者 / 確認責任者
    - '不採用候補: 「査読担当者」・「審査担当者」・「確認責任者」. 根拠: 「査読担当者」は学術 peer review 語感. 「確認責任者」は階層的誤解. 「文書確認担当者」は IPA 要件定義ガイド §レビュー担当者 + JIS
      X 0160 §確認プロセス と直接対応.'
  - - subagent
    - 処理担当プロセス / 分担処理担当者 / 下位担当者 / 実行担当者
    - '不採用候補: 「処理担当プロセス」・「分担処理担当者」・「下位担当者」. 根拠: ★ F-6 修正注記: 「subagent」(使用禁止語) 自体は AI 開発手法の内部概念で JIS / IPA / CSV ガイドラインに該当語なし.
      訳語選定根拠として JIS X 0160 §6.4.7 実装プロセス + 共通フレーム §2 テクニ…'
  - - atom
    - 検証単位 / 検証項目 / データ単位 / 記録単位
    - '不採用候補: 「検証項目」・「データ単位」・「記録単位」. 根拠: CJUG SDTM v1.4 §2.1 の「データセット/レコード」階層と区別必要 (「atom」(使用禁止語) はレコード以下の検証粒度). 「データ単位」「記録単位」は
      ER/ES や SDTM 階層と混同リスク. 「検証単位」は CSV ガイドライン…'
  - - ledger
    - 検証台帳 / 検証記録簿 / 管理台帳 / 追跡台帳
    - '不採用候補: 「検証記録簿」・「管理台帳」・「追跡台帳」. 根拠: 「検証記録簿」は ER/ES「監査証跡」と語感重複. 「管理台帳」は文書管理慣用で検証特化が薄れる. 「検証台帳」は CSV ガイドライン「システム台帳」の医薬品
      IT 文脈定着度を援用.'
  - - evidence
    - 根拠資料 / 検証証跡 / エビデンス / 証拠文書
    - '不採用候補: 「検証証跡」・「エビデンス」・「証拠文書」. 根拠: 「エビデンス」はカタカナ禁止. 「検証証跡」は ER/ES §2「監査証跡 (Audit Trail)」と概念衝突. 「根拠資料」は IPA 機能要件合意形成ガイドで要件根拠文書として使用実績.'
  - - drift
    - 乖離 / 差異 / 逸脱 / ずれ
    - '不採用候補: 「差異」・「逸脱」・「ずれ」. 根拠: 「逸脱」は CSV ガイドライン「手順書からの逸脱」固有用法と衝突. 「差異」は経時的ずれを表現不足. 「ずれ」はひらがなで JIS Z 8301 §規格票作成規則 に不適切.
      「乖離」は共通フレーム + IPA 要件定義ガイドの「期待値…'
  - - dropout
    - 対象外項目 / 除外項目 / 除外エントリ / スキップ項目
    - '不採用候補: 「除外項目」・「除外エントリ」・「スキップ項目」. 根拠: ★ 重要衝突: 臨床試験文脈では 「dropout」(使用禁止語) = 被験者脱落・中止. SDTMIG v3.2 では §DS ドメイン (Disposition
      Event, 第 6 章 一般オブザベーションクラス Events 系) の DSDECO…'
  - - progress.json
    - 進捗管理ファイル / 進行状況記録 / 進捗記録ファイル / 状態管理ファイル
    - '不採用候補: 「進行状況記録」・「進捗記録ファイル」・「状態管理ファイル」. 根拠: 「進行状況記録」は文書管理語との統一感薄れ. 「状態管理ファイル」は CSV システム状態と混同. 「進捗管理」は共通フレーム §プロジェクト管理
      + IPA モデル契約書 §進捗報告 で標準語.'
  - - worklog
    - 作業記録 / 作業履歴 / 業務日誌 / 作業ログ
    - '不採用候補: 「作業履歴」・「業務日誌」・「作業ログ」. 根拠: 「作業ログ」はカタカナ含む. 「業務日誌」は日常語感. 「作業履歴」は事後集約の語感, リアルタイム不適. 「作業記録」は IPA モデル契約書 §プロジェクト文書体系
      で使用, ER/ES「監査証跡」と区別.'
  - - Rule D
    - 審査独立性原則 / 独立審査規則 / 利益相反回避原則 / 分離審査規程
    - '不採用候補: 「独立審査規則」・「利益相反回避原則」・「分離審査規程」. 根拠: 「利益相反回避原則」は ICH E6 / 法曹会計の特化語で粒度違い. 「独立審査規則」は法令用語と混同. 「審査独立性原則」は CSV ガイドライン
      §供給者アセスメント + JIS X 0160 §検証プロセス独立性要件 と整合.'
  - - PASS 四条
    - 合格判定基準 / 受入判定基準 / 適合判定基準
    - '不採用候補: 「受入判定基準」・「適合判定基準」. 根拠: 厚労省 CSV ガイドライン §5 で IQ/OQ/PQ 判定について「合格判定基準」が標準語. 「受入判定基準」は受入試験文脈に特化過ぎ. 「適合判定基準」は ISO
      認証文脈で混同リスク.'
  - - PASS 五条
    - 合格判定基準 / 受入判定基準 / 適合判定基準
    - '不採用候補: 「受入判定基準」・「適合判定基準」. 根拠: PASS 四条と同一カテゴリ. 用語監査条件追加版だが外部文書での条件数明示は混乱を招くため統一.'
  - - Tier 1
    - 小規模工程 / 第 1 種工程規模 / 簡易工程
    - '不採用候補: 「小規模工程」・「第 1 種工程規模」・「簡易工程」. 根拠: 「Tier 1」(使用禁止語)/2/3 は内部工程規模分類, 納品物に記載する設計概念ではない. JIS X 0160:2021 §6.4 テーラリング
      / 共通フレーム 2013 にも三分類対応の公式語は存在しない.'
  - - Tier 2
    - 中規模工程 / 第 2 種工程規模 / 標準工程
    - '不採用候補: 「中規模工程」・「第 2 種工程規模」・「標準工程」. 根拠: 「Tier 1」(使用禁止語) と同一判断. 「標準工程」は規格根拠なし. 「中規模工程」は形容語.'
  - - Tier 3
    - 大規模工程 / 第 3 種工程規模 / 高度管理工程
    - '不採用候補: 「大規模工程」・「第 3 種工程規模」・「高度管理工程」. 根拠: 「Tier 1」(使用禁止語)/2 と同一判断. 「高度管理工程」は規格根拠なし造語.'
  - - chain
    - 変更連鎖 / 関連文書連動 / 相互参照
    - '不採用候補: 「関連文書連動」・「相互参照」. 根拠: 「相互参照」は双方向参照のみで「更新時の同期義務」動的側面欠落. 「関連文書連動」は規格根拠なし造語. 「変更連鎖」は IPA モデル契約書「変更管理」+「連鎖」概念で正確.'
  - - gate
    - 工程審査 / マイルストン審査 / 工程移行判定
    - '不採用候補: 「工程審査」・「マイルストン審査」. 根拠: 「工程審査」は審査行為で合否判定の関門意味が不明確. 「マイルストン審査」はカタカナ含む. 「工程移行判定」は共通フレーム §プロセスレビュー + JIS X 0160
      §7 移行基準 と整合.'
  - - ack
    - 承認 / 確認 / 了承
    - '不採用候補: 「確認」・「了承」. 根拠: 「確認」は事実認知を指し意思決定意味なし. 「了承」は商慣行的, 公文書では「承認」優先. 「承認」は CSV ガイドライン §6.6 変更管理 + IPA モデル契約書 §承認欄 で標準語.'
  - - だいたい
    - 概ね / 約 / 概略として
    - '不採用候補: 「概ね」・「約」・「概略として」. 根拠: 文化庁「公用文作成の考え方」(2022) §専門用語の扱い + である調統一 で口語表現は不適. 数値: 「約」/ 範囲・期間: 「概ね」/ 手順・内容要約: 「概略として」と使い分け.'
  - - ちゃんと
    - 適切に / 正確に / 確実に
    - '不採用候補: 「適切に」・「正確に」・「確実に」. 根拠: 文化庁「公用文作成の考え方」(2022) で様態副詞は技術文書で具体性欠く語として回避. 方法妥当性: 「適切に」/ 数値内容誤りなし: 「正確に」/ 実行完了保証: 「確実に」と使い分け.'
  - - ざっくり
    - 概要として / 大まかに / 要約すると
    - '不採用候補: 「概要として」・「大まかに」・「要約すると」. 根拠: 公用文 (2022) §読み手が正確に理解できる語 原則に反する. 精度低さを含意し信頼性にマイナス. 全体像: 「概要として」/ 細部捨象: 「大まかに」/
      詳細圧縮: 「要約すると」と使い分け.'
  - - いい感じ
    - 良好な状態 / 適切な水準 / 期待どおりの結果
    - '不採用候補: 「良好な状態」・「適切な水準」・「期待どおりの結果」. 根拠: 公用文 (2022) §である調統一 + 専門用語の扱い から最も不適切な主観評価語. 品質基準達成: 「良好な状態」/ 閾値妥当: 「適切な水準」/
      期待値一致: 「期待どおりの結果」と使い分け.'
  - - アトム
    - 検証単位 / 基本検証要素 / 最小検証単位
    - '不採用候補: 「基本検証要素」・「最小検証単位」. 根拠: カタカナ直訳禁止 (硬約束 H-1). 「atom」(使用禁止語) エントリと統一: 「検証単位」.'
  - - レジャー
    - 検証台帳 / 管理台帳 / 追跡台帳
    - '不採用候補: 「管理台帳」・「追跡台帳」. 根拠: カタカナ直訳禁止 + 日本語「「レジャー」(使用禁止語)」は通常 "leisure (余暇)" の定着訳語のため致命的混乱リスク. 「ledger」(使用禁止語) エントリと統一:
      「検証台帳」.'
  - - サブエージェント
    - 副担当エージェント / 下位処理エージェント / 処理担当エージェント / 実行担当者
    - '不採用候補: 「副担当エージェント」・「下位処理エージェント」・「処理担当エージェント」. 根拠: カタカナ直訳禁止. 「subagent」(使用禁止語) エントリと整合: 「実行担当者」. Cross-「batch」(使用禁止語)
      reconciliation: 「Batch」(使用禁止語) 2 「専門担当エージェント」案を不採用 ((1) sibling pattern 統一 writ…'
approval:
  enabled: true
