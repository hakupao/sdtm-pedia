audit_targets:
  total_entries: 33
  required_fields_per_entry:
    - candidates (>= 3)
    - adopted
    - reason (2-4 行で採用/不採用両方)
    - reference (>= 2 件, reference_standards.md 掲載のみ)
    - notes
  cross_batch_reconciliations_completed: 1
  cjug_d2_application_count: 9  # CJUG 公式訳なし明示エントリ (N-2 修正: katakana エイリアス アトム/レジャー 含算で 9. atom/ledger/evidence/drift/dropout/progress.json/worklog + アトム/レジャー)
  paid_standards_referenced_via_alternatives: 3  # JIS X 0160 (多数) + Z 8301 (chain/drift) + 共通フレーム 2013 (多数). JIS X 25010 / T 14971 は本文中引用ゼロ (F-5 修正後正確値)

reviewer_checklist:
  - "[ ] 全 33 エントリで candidates >= 3"
  - "[ ] 全 33 エントリで reference >= 2"
  - "[ ] reference_standards.md 未掲載規格の混入なし"
