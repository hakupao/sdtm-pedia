#   - 内部 jargon (term_blacklist.yml 掲載語) を納品物 (.xlsx) で使用する公開語に写像
#   - 各エントリは 3 候補 + 採用根拠 + 参照規格 2 件以上 を必須
#   - 出典は reference_standards.md 掲載規格のみ許容
