# ============================================================================
# Category 1: process_jargon (10 terms) — 工程・タスク管理用語
# ============================================================================

entries:

  - internal: round
    candidates: ["回次", "フェーズ", "作業サイクル", "実施回"]
    adopted: "実施回"
    reason: |
      JIS X 0160:2021 / 共通フレーム 2013 で「フェーズ」は工程区分で定着 → iteration 意味と不整合.
      「回次」は会議用語で IT 不適. 「実施回」は IPA 要件定義ガイド §要件定義マネジメント の用法と整合, 平易.
    reference:
      - "IPA ユーザのための要件定義ガイド 第2版 §要件定義マネジメント (2019)"
      - "共通フレーム 2013 (SLCP-JCF2013) — F-2 修正: 起草時「§プロセスの繰返し記述」のタイトルは公開資料で一次確認不可 (有償書籍未確認 — D-6 制約); プロセス反復概念は内包されるが当該節タイトル不存在の可能性"
      - "公用文作成の考え方 §外来語の言い換え方針 (2022)"
    notes: |
      アジャイル文脈は「スプリント」だが本納品先 iTMS は規制対応 → ウォーターフォール想定で「実施回」.
      初出時に「(英: round)」併記推奨.

  - internal: batch
    candidates: ["一括処理", "処理単位", "作業束", "処理群"]
    adopted: "処理単位"
    reason: |
      「一括処理」は IPA 機能要件合意形成ガイドの「バッチ処理」訳だが本プロジェクト用法 (作業分割単位) と異なる.
      「処理単位」は IPA 非機能要求グレード §性能・拡張性 の単位概念と整合.
    reference:
      - "IPA 機能要件の合意形成ガイド バッチ編 §バッチ処理 (2010)"
      - "IPA 非機能要求グレード 2018 §性能・拡張性 (2018)"
    notes: |
      「バッチ処理」(一括実行様式) と区別が必要な場合は「作業処理単位」と修飾語追加.

  - internal: kickoff
    candidates: ["開始宣言", "着手指示", "工程開始", "起動指示"]
    adopted: "着手指示"
    reason: |
      「開始宣言」は儀礼的, 「工程開始」は工程全体と混同, 「起動指示」はシステム起動と混同.
      「着手指示」は IPA モデル契約書 §プロジェクト管理義務 で「着手」が開発開始行為として明示.
    reference:
      - "IPA 情報システム・モデル取引・契約書 第二版 §プロジェクト管理義務 (2020)"
      - "共通フレーム 2013 (SLCP-JCF2013) — F-2 修正: 起草時「§プロセス開始・終了条件」は公開資料で一次確認不可 (有償書籍未確認 — D-6 制約); プロセス節の「開始・終了条件」サブ節は JIS X 0160:2012 旧版構造由来"
    notes: |
      「キックオフ会議」を指す場合は「着手会議」または「工程開始会議」を使い分け.

  - internal: handoff
    candidates: ["引継ぎ", "成果物移管", "工程間引渡し", "受渡し"]
    adopted: "工程間引渡し"
    reason: |
      「引継ぎ」は人事業務継続用語で IT 工程に意味が広すぎ. 「受渡し」は契約上の納品行為に特化.
      「工程間引渡し」は JIS X 0160:2021 §プロセスインタフェース で工程間入出力関係として記述.
    reference:
      - "JIS X 0160:2021 ソフトウェアライフサイクルプロセス (詳細§番号は有償全文未確認 — D-6 制約; F-2 修正: 起草時 §プロセスインタフェース・入出力 は kikakurui.com / jis.eomec.com 公開版で一次確認不可)"
      - "IPA 情報システム・モデル取引・契約書 第二版 §受渡し・検収 (2020)"
      - "厚労省 CSV ガイドライン §変更の管理 (2010)"
    notes: |
      Excel 列ヘッダで文字数優先時は「引渡し」に短縮可, 定義欄に「工程間引渡しの略」明記.
      人事用は「業務引継ぎ」で区別.

  - internal: cut
    candidates: ["版確定", "版締め", "確定版", "リリース基点"]
    adopted: "版確定"
    reason: |
      「確定版」は名詞 (成果物), 「リリース基点」はカタカナ含む.
      「版確定」は IPA モデル契約書 §重要事項説明書・版管理 と CSV ガイドライン §変更の管理 と整合.
    reference:
      - "IPA 情報システム・モデル取引・契約書 第二版 §版管理 (2020)"
      - "厚労省 CSV ガイドライン §変更の管理・版管理 (2010)"
    notes: |
      複合語: 「版確定日」「版確定番号」. 「確定版」(名詞) と「版確定」(行為名) を文書内で使い分け.

  - internal: multi-session
    candidates: ["複数班並列作業", "分散並行実施", "並列処理体制", "多班同時実施"]
    adopted: "複数班並列作業"
    reason: |
      「並列処理体制」は IT 並列実行と混同. 「分散」はネットワーク分散の含意.
      「複数班並列作業」は IPA 非機能要求グレード §運用・保守性 + 共通フレーム §合意プロセス と整合.
    reference:
      - "JIS X 0160:2021 ソフトウェアライフサイクルプロセス (附属書 D 関連; F-2 修正: 起草時「§並行プロセスとプロセスインタフェース」のタイトルは公開版で一次確認不可 — D-6 制約)"
      - "IPA 非機能要求グレード 2018 §運用・保守性 (2018)"
      - "共通フレーム 2013 §合意プロセス (2013)"
    notes: |
      Excel で短縮時は「並列作業体制」, 定義欄に「複数班を並列に動かす作業方式」と注記.
      「並列」vs「並行」は D-7 準拠で案件ごと判断.

  - internal: reconciler
    candidates: ["整合確認担当者", "突合担当者", "照合責任者", "整合検証者"]
    adopted: "整合確認担当者"
    reason: |
      「突合」は財務会計の数値照合語感. 「整合検証者」は QA 役職と混同.
      「整合確認担当者」は CSV ガイドライン §変更の管理 で整合性確認が担当者単位で記録される旨に整合.
    reference:
      - "JIS X 0160:2021 §6.4.9 検証プロセス (Verification process) — F-2 修正: 起草時「§検証プロセス・整合性確認」のサブ節タイトルは公開版で一次確認不可 (PARTIAL); 規格存在は jis.eomec.com で §6.4.9 として確認"
      - "厚労省 CSV ガイドライン §変更の管理・整合性確認 (2010)"
      - "IPA 機能要件の合意形成ガイド §合意形成担当者の役割 (2010)"
    notes: |
      AI が担う場合は「整合確認担当者 (AI)」と括弧書き. Excel では「整合確認者」に短縮可.

  - internal: writer
    candidates: ["文書作成担当者", "起草担当者", "文書作成プロセス担当"]
    adopted: "文書作成担当者"
    reason: |
      「作成者」は範囲不明確 (設計者・実装者も該当しうる). 「起草担当者」は法的文書語感.
      「文書作成担当者」は IPA 要件定義ガイド §要件定義書の作成担当者 で明示.
    reference:
      - "IPA ユーザのための要件定義ガイド 第2版 §要件定義書の作成担当者 (2019)"
      - "JIS X 0160:2021 ソフトウェアライフサイクルプロセス (情報管理プロセス相当; F-2 修正: 起草時「§文書化プロセス」は 2021 版では統合・改名された可能性が高く独立節として一次確認不可 — D-6 制約)"
      - "厚労省 CSV ガイドライン §要求仕様書 (URS) 作成 (2010)"
    notes: |
      AI が担う場合は「文書作成担当者 (AI)」と明示. Excel 役割列では「作成担当」短縮可.
      「ライター」「ライタ」のカタカナ表記は禁止.

  - internal: reviewer
    candidates: ["査読担当者", "文書確認担当者", "審査担当者", "確認責任者"]
    adopted: "文書確認担当者"
    reason: |
      「査読担当者」は学術 peer review 語感. 「確認責任者」は階層的誤解.
      「文書確認担当者」は IPA 要件定義ガイド §レビュー担当者 + JIS X 0160 §確認プロセス と直接対応.
    reference:
      - "JIS X 0160:2021 §6.4.9 検証プロセス + §6.4.11 妥当性確認プロセス相当 — F-2 修正: 起草時「§検証プロセス・確認プロセス」の結合節タイトルは公開版で一次確認不可; 個別存在は jis.eomec.com で確認"
      - "IPA ユーザのための要件定義ガイド 第2版 §要件定義書のレビュー担当者 (2019)"
      - "厚労省 CSV ガイドライン §変更の管理・確認 (2010)"
    notes: |
      文書作成担当者と異なる主体が担う (審査独立性原則 = Rule D). AI 時は「文書確認担当者 (AI)」.
      Excel では「確認担当」短縮可. 「レビュー担当者」は外来語含むため第二候補.

  - internal: subagent
    candidates: ["処理担当プロセス", "分担処理担当者", "下位担当者", "実行担当者"]
    adopted: "実行担当者"
    reason: |
      ★ F-6 修正注記: subagent 自体は AI 開発手法の内部概念で JIS / IPA / CSV ガイドラインに該当語なし.
      訳語選定根拠として JIS X 0160 §6.4.7 実装プロセス + 共通フレーム §2 テクニカルプロセスの
      「実行」役割概念を借用適用.
      「処理担当プロセス」は曖昧 (組織 vs IT). 「下位担当者」は階層強調すぎ.
      「実行担当者」は writer=文書作成担当者 / reviewer=文書確認担当者 と sibling pattern 統一
      (cross-batch 整合).
    reference:
      - "JIS X 0160:2021 §6.4.7 実装プロセス (Implementation process) — F-2 修正: 起草時「§実装プロセス・役割定義」のサブ節タイトル「役割定義」は ISO 12207:2017 で構造変化により独立サブ節は廃止 (PARTIAL); 実装プロセス本体は jis.eomec.com で §6.4.7 として確認"
      - "IPA 情報システム・モデル取引・契約書 第二版 §プロジェクト管理義務 (2020)"
      - "共通フレーム 2013 (SLCP-JCF2013) §2.1.2 システム化計画の立案 (推定) — F-2 修正: 起草時「§システム化計画の立案・実行役割」のサブ節「実行役割」は公開資料で一次確認不可; システム化計画の立案 自体は IPA 公式概要で第 2 部企画プロセス下位として確認"
    notes: |
      主 session (オーケストレーター) からの指示で独立実行する AI プロセス.
      Excel では「実行担当者 (AI プロセス)」と付記推奨. 人間担当者にも用いる場合は「実行担当者 (人)」.
      ★ Cross-batch reconciliation: Batch 2 「専門担当エージェント」案を不採用,「実行担当者」に統一.

# ============================================================================
# Category 2: artifact_jargon (7 terms) — データ・成果物用語
# ============================================================================

  - internal: atom
    candidates: ["検証単位", "検証項目", "データ単位", "記録単位"]
    adopted: "検証単位"
    reason: |
      CJUG SDTM v1.4 §2.1 の「データセット/レコード」階層と区別必要 (atom はレコード以下の検証粒度).
      「データ単位」「記録単位」は ER/ES や SDTM 階層と混同リスク. 「検証単位」は CSV ガイドライン §バリデーション と整合.
    reference:
      - "厚労省 CSV ガイドライン §1.1 / §10 (2010)"
      - "IPA 非機能要求グレード 2018 §3"
      - "CJUG SDTM v1.4 日本語版 §2.1 p.12 (公式訳なし; D-2 適用)"
    notes: |
      CJUG 公式訳なし (D-2). SDTM「オブザベーション」とは別概念. schema: `.work/06_deep_verification/schema/atom_schema.json`.

  - internal: ledger
    candidates: ["検証台帳", "検証記録簿", "管理台帳", "追跡台帳"]
    adopted: "検証台帳"
    reason: |
      「検証記録簿」は ER/ES「監査証跡」と語感重複. 「管理台帳」は文書管理慣用で検証特化が薄れる.
      「検証台帳」は CSV ガイドライン「システム台帳」の医薬品 IT 文脈定着度を援用.
    reference:
      - "厚労省 CSV ガイドライン システム台帳 (2010)"
      - "IPA 情報システム・モデル取引・契約書 第二版 (2020)"
      - "CJUG SDTM v1.4 日本語版 (公式訳なし; D-2 適用)"
    notes: |
      CJUG 公式訳なし (D-2). 長音符 D-7 不適用 (漢語).

  - internal: evidence
    candidates: ["根拠資料", "検証証跡", "エビデンス", "証拠文書"]
    adopted: "根拠資料"
    reason: |
      「エビデンス」はカタカナ禁止. 「検証証跡」は ER/ES §2「監査証跡 (Audit Trail)」と概念衝突.
      「根拠資料」は IPA 機能要件合意形成ガイドで要件根拠文書として使用実績.
    reference:
      - "IPA 機能要件の合意形成ガイド (2010)"
      - "ER/ES 指針 §2 監査証跡との概念区別 (2005)"
      - "公用文作成の考え方 §専門用語の言い換え (2022)"
      - "CJUG SDTM v1.4 日本語版 (公式訳なし; D-2 適用)"
    notes: |
      ★ 重要: 本「根拠資料」は ER/ES「監査証跡 (Audit Trail)」とは異なる. 文書内で混同回避の注記必須.
      ディレクトリ: `.work/06_deep_verification/evidence/`.

  - internal: drift
    candidates: ["乖離", "逸脱", "ずれ"]
    adopted: "乖離"
    reason: |
      「逸脱」は CSV ガイドライン「手順書からの逸脱」固有用法と衝突. 「差異」は経時的ずれを表現不足.
      「ずれ」はひらがなで JIS Z 8301 §規格票作成規則 に不適切. 「乖離」は共通フレーム + IPA 要件定義ガイドの「期待値と実績の乖離」と整合.
    reference:
      - "共通フレーム 2013 (2013)"
      - "IPA ユーザのための要件定義ガイド 第2版 §3 (2019)"
      - "厚労省 CSV ガイドライン (2010) — 「逸脱」概念区別"
      - "JIS Z 8301:2019 §8 用字, 用語及び略語 — F-2 修正: 起草時「§規格票作成規則」のタイトルは規格内に存在せず (規格正式タイトル「規格票の様式及び作成方法」自体を要約した語); 公開版 kikakurui.com で §8 として確認"
      - "CJUG SDTM v1.4 日本語版 (公式訳なし; D-2 適用)"
    notes: |
