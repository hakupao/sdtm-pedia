    content_summary: "本知識ベース整備の反復実績概況 (期間・反復総数・規律方針)"
    content: |
      1.1 本書の目的

      本書は, SDTM 知識ベース構築および iTMS 様向け納品ドキュメント整備の全工程における, 検査・修正・反復の実績を集約し提示する補助文書である。受信者向け納品物 (要件定義書 / 基本設計書 等) は最終確定版のみを提示するため, 結果に至る過程の試行錯誤の規模を可視化する目的で作成した。

      1.2 整備期間

      整備期間は 2026 年 4 月 13 日 (本知識ベース構築開始) から 2026 年 4 月 30 日 (本中間版提出日) までの約 18 日間である。期間中の成果物変更件数は 267 件 (重要マイルストーンは §7 に詳述する)。

      1.3 反復方針

      本整備では「作成担当 + 独立確認担当 + 用語監査担当」の三役完全分離体制を採用した。同一担当者による自審を禁じ, 異なる種別の確認担当者が独立に検査することで, 単一視点では見落としやすい不整合を多角的に検出する方針である。

      なお本書中の「回次」は同一作業対象に対する独立確認担当の検査循環を指す。第 1 回が条件付合格の場合は指摘事項を反映後に第 2 回に進む方式とした。確認担当は第 1 回と第 2 回で別の担当者を割り当て, 同一文脈での自審を回避している。

      出典: docs/jp/PLAN.md §6 + docs/jp/CHANGELOG.md。

      1.4 反復総数概況

      下表に各工程系統の反復総数概況を示す。詳細は §2 - §6 の各シートを参照されたい。

       - AI 平台 4 種プロンプト整備: 4 平台 × 多数版数 = 累計 18 版超 (各平台 4 - 7 版進化)
       - smoke 動作試験: v2 → v4.0 → v5c 回帰確認 = 9 反復
       - 知識ベース字面級確認 (公開発布版): 14 回次 (各回次に複数バッチを含む)
       - 受信者向け文書整備 (本中間版): 第 0 - 第 0.7 + 第 1 段階 第 1-2 着手 = 計 16 反復
       - 用語写像辞書 整備: 第 1 - 第 3 回独立確認 = 3 反復で確定

      合計反復回数 (独立確認担当による検査循環) は約 50 回次相当である。検出された不整合は所定の手順で修正後再確認する方式 (合格判定基準充足まで反復) を一貫して適用した。

      1.5 反復の意義

      多重反復は工数増大の側面はあるものの, 単一視点では検出不能な不整合 (主張文と引用源のずれ, 用語の混在, 数値と本文の乖離等) を体系的に解消する効果が確認できた。本中間版に同梱する確定版 2 件 (要件定義書 v1.0 / 基本設計書 v1.0) は, いずれも独立確認担当による検査の第 2 回において無条件合格を取得している。

      出典: docs/jp/glossary/research_reports/phase_1_04_reviewer_round_2_2026-04-29.md + phase_1_01_reviewer_round_2_2026-04-29.md。

