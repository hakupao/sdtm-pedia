      - ["3.1",
         "知識ベース三件パターン (ドメイン)",
         "各ドメインディレクトリ (例: knowledge_base/domains/AE/) に spec.md / assumptions.md / examples.md の 3 件構成を採用する。spec.md は変数仕様 (変数名・ラベル・型・Core 区分・C 符号) を SDTMIG xlsx から生成。assumptions.md は業務上の前提・変数使用指導・編码規範を PDF から抽出。examples.md は実装例のデータ表を PDF から抽出。63 ドメイン全件に適用する固定パターンである。",
         "運用中",
         "METHODOLOGY.md §3 + knowledge_base/INDEX.md"]
      - ["3.2",
         "章節文書・モデル文書",
         "chapters/ には SDTMIG v3.4 の共通章 6 件 (ch01_introduction.md / ch02_fundamentals.md / ch03_submitting_data.md / ch04_general_assumptions.md / ch08_relationships.md / ch10_appendices.md) を収録する。ch05〜ch07 および ch09 はドメイン各論章であり SDTMIG v3.4 の章番号体系に準拠した不連続選択である。各ファイルの先頭に PDF 頁範囲を付与し、SDTMIG 目次と直接対応する。model/ には SDTM Model v2.0 の概念モデル 6 件 (concepts_and_terms.md / observation_classes.md / special_purpose_domains.md / associated_persons.md / study_level_data.md / relationship_datasets.md) を収録する。",
         "運用中",
         "knowledge_base/INDEX.md + METHODOLOGY.md §2 Phase 4"]
      - ["3.3",
         "受控用語データ構造",
         "knowledge_base/terminology/ 配下にコードリスト文書群を収録する。CDISC 受控用語 (Controlled Terminology) xlsx 2024 年版を根拠とし、1,005 のコードリストおよび 37,939 用語を three 層 (core/ / questionnaires/ / supplementary/) に分類する。各コードリスト文書に CDISC 割当の C 符号 (例: C66731) を保持し、米国国立がん研究所 EVS Browser (NCI EVS Browser) との相互参照を可能とする。",
         "運用中",
         "METHODOLOGY.md §3 第 3 段落 + docs/jp/04_要件定義書.xlsx §3 FR-10"]
      - ["3.4",
         "検証単位データモデル (atom_schema v1.2)",
         "検証単位データ schema (atom_schema v1.2、凍結日: 2026-04-24) に従う。PDF 原子と MD 原子の共存型 (oneOf) で、atom_id 前缀により区別する。PDF 原子の atom_id 形式: <source_short>_p<NNN>_a<NNN> (例: ig34_p0425_a012)。MD 原子の atom_id 形式: md_<file_stem>_a<NNN> (例: md_ch08_a042)。atom_type は 9 値硬列挙型 (HEADING / SENTENCE / LIST_ITEM / TABLE_HEADER / TABLE_ROW / CODE_LITERAL / CROSS_REF / FIGURE / NOTE)。dataset 文件名 (*.xpt 等) は文脈に関わらず CODE_LITERAL として扱う硬規則あり。",
         "凍結済",
         ".work/06_deep_verification/schema/atom_schema.json (v1.2)"]
      - ["3.5",
         "突合管理表データモデル (ledger_schema v1.2)",
         "突合管理表データ schema (ledger_schema v1.2、凍結日: 2026-04-24) に従う。1 行 JSONL = 1 突合決定として記録する。必須フィールド: verdict / similarity_score (0.0〜1.0) / matched_by。順方向 (PDF→MD) verdict は 9 値 (EXACT / EQUIVALENT / EDITORIAL_CORRECTION / TABLE_SIMPLIFIED / PARTIAL / MISPLACED / ERROR / MISSING / INTENTIONAL_EXCLUDE)。逆方向 (MD→PDF) verdict は 5 値 (SOURCED / EDITORIAL_ADDITION / SYNTHESIZED / UNSOURCED / HALLUCINATED)。数値条件: PARTIAL は similarity_score ≥ 0.50、SOURCED は similarity_score ≥ 0.50 が必須。独立二次審査記録は audited_by 配列に追記する。",
         "凍結済",
         ".work/06_deep_verification/schema/ledger_schema.json (v1.2)"]
      - ["3.6",
         "RAG チャンクメタデータ (Phase 7 設計済・実装未着手)",
         "Phase 7 第 1 段階 RAG ベクトル検索向けに、各チャンクへ構造化メタデータを付与する設計。メタデータ 6 項目: source (ソースファイルパス) / domain (ドメイン符号、63 値) / class (観察クラス) / file_type (spec / assumptions / examples / chapter / model / terminology) / section (節・変数名) / chunk_index (チャンク連番)。ドメイン絞込検索と意味類似度の 2 段検索を可能とする。現状は設計確定・実装未着手である。",
         "設計済・未実装",
         "docs/DESIGN_RAG_KG.md §3.2"]
      - ["3.7",
         "知識グラフ ノード・リレーション (Phase 7 設計済・実装未着手)",
         "Phase 7 第 2 段階 KG 向けに、Neo4j へノードおよびリレーションを投入する設計。ノード 6 種 (件数付き): Domain 63 件 / Variable 約 1,523 件 / Codelist 約 1,005 件 / Term 約 37,939 件 / Class 7 件 / Chapter 6 件。リレーション 7 種 (方向付き): HAS_VARIABLE (Domain → Variable) / BELONGS_TO (Domain → Class) / USES_CT (Variable → Codelist) / CONTAINS_TERM (Codelist → Term) / RELATED_TO (Domain → Domain、機序付き) / DESCRIBED_IN (Domain → Chapter) / SHARED_VARIABLE (Variable → Variable)。データソースは各ドメインの meta.yaml (P3 構造化メタデータ) であり、自動生成スクリプト (DESIGN_RAG_KG.md §5.1 設計済) による meta.yaml の出力は本書執筆時点で未実施。現状は設計確定・実装未着手である。",
         "設計済・未実装",
         "docs/DESIGN_RAG_KG.md §5.2"]
    note_rows: []

