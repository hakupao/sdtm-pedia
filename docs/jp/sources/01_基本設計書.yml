  # ─────────────────────────────────────────────
  # 1. 概要
  # 引用源: S-1 (METHODOLOGY.md) + S-7 (04 要件定義書) + S-2 (DESIGN_RAG_KG.md) + S-11 (ai_platforms/release/v1.0/)
  # ─────────────────────────────────────────────
  - name: "1_概要"
    type: "text"
    content_summary: "本書の目的・設計対象システムの範囲・想定読者・関連文書・設計方針"
    content: |
      1.1 本書の目的

      本書は、ITMS-SDTM-04 要件定義書 (v1.0、以下「04 要件定義書」という) が定めた機能要件 (FR-01〜FR-11) および非機能要件 (NFR-01〜NFR-06) を実現する基本設計を提示する。本書は 04 要件定義書の設計レベル後続文書であり、知識ベース本体・検証パイプライン・AI 平台展開・Phase 7 検索拡張生成 (RAG: Retrieval-Augmented Generation) および知識グラフ (KG: Knowledge Graph) の 4 サブシステムについて、その全体構成、データモデル、外部インタフェース、および設計制約を規定する。

      出典: docs/jp/04_要件定義書.xlsx §1.5 + METHODOLOGY.md Purpose。

      1.2 設計対象システムの範囲

      本書の設計対象は以下の 4 サブシステムである。

      (1) 知識ベース本体 — 臨床試験データ表形式モデル (SDTM: Study Data Tabulation Model) の CDISC 公式刊行物から抽出・再構成した 293 件の Markdown ファイル群。63 ドメイン・6 章・6 モデル文書・受控用語群・索引文書で構成される。現行運用中。

      (2) 検証パイプライン — 知識ベース本体の各記述を出典 PDF と頁単位で照合する字面級確認の独立工程。検証単位データ schema (atom_schema v1.2 凍結済) および突合管理表データ schema (ledger_schema v1.2 凍結済) を基盤とする。現行運用中 (対象範囲の 97% 完了)。

      (3) AI 平台展開 — 知識ベースを ChatGPT GPTs・Google Gemini Gems・Google NotebookLM・Anthropic Claude Projects の 4 平台向けに再パッケージしたリリース版 v1.0。現行運用中 (Phase 6.5 完了)。

      (4) Phase 7 RAG+KG — 検索拡張生成 (RAG) および知識グラフ (KG) を組み合わせた二段階インテリジェント検索・確認システムの設計仕様。現状は設計確定・実装未着手。

      出典: METHODOLOGY.md §2 + docs/DESIGN_RAG_KG.md §1.4 + ai_platforms/release/v1.0/。

      1.3 想定読者

      本書の想定読者は、IT 分野および医療データ分野の双方に知見を有する実務担当者である。具体的には、臨床試験データ管理、SDTM データプログラミング、マッピング品質確認、SDTM 教育に従事する技術者および管理者を想定する。04 要件定義書 §1.3 と同一の読者層を対象とする。

      出典: docs/jp/04_要件定義書.xlsx §1.3 + docs/jp/PLAN.md §0 受信者欄。

      1.4 関連文書

      本書は以下の文書群と連携する。

      ・04 要件定義書 (ITMS-SDTM-04): 本書の上位根拠章。機能要件 FR-01〜FR-11、非機能要件 NFR-01〜NFR-06、制約条件 C-01〜C-05 を規定する。
      ・02 運用保守マニュアル (ITMS-SDTM-02): 本書が規定するシステム構成に基づく日常運用手順・保守手順・障害対応を記述する。
      ・03 テスト結果報告書 (ITMS-SDTM-03): 本書が規定する設計の試験範囲・実施結果・合格判定・根拠資料を記録する。
      ・05 詳細設計書 (ITMS-SDTM-05): 本書の各章 (特に §3 データモデル) の章別詳細展開を記述する。
      ・06 トレーサビリティ管理表 (ITMS-SDTM-06): 本書の設計項目と要件・試験・根拠資料の横断対応を記録する。なお「トレーサビリティ管理表」は文書の正式名称 (固有名) であり、概念用語としての「追跡可能性 (traceability)」とは区別して用いる。
      ・99 用語集: 本書で用いる技術用語の英語・日本語・中国語・出典規格の四列対照辞書。

      出典: docs/jp/PLAN.md §1。

      1.5 設計方針 (中核理念)

      本書全体を貫く設計方針は以下の 4 点である。

      (1) 字面追跡可能性 — 知識ベースの任意の記述について、出典 PDF の対応頁および節を数秒で照合できる構造を設計原則とする。ドメイン・章節・受控用語の各層で追跡経路を完備する。

      (2) リスク主導確認 — GAMP 5 (国際製薬技術協会 ISPE 発行) のリスク主導確認の考え方に整合し、宣言された仕様・実行された確認・独立した審査・文書化された不整合追跡を備える。

      (3) ローカル先行・プロバイダー非依存 — Phase 7 RAG+KG はすべて Docker Compose によるローカル実行を前提とし、特定の LLM 供給者に固定しない設計とする。クラウド展開は本設計範囲外とする。

      (4) 読取専用源 + 派生著作物 — knowledge_base/ ディレクトリは変更不可の読取専用源として扱う。本納品物を含む改修は派生著作物側にのみ適用する。

      出典: (1) 字面追跡可能性 = METHODOLOGY.md §3、(2) リスク主導確認 = METHODOLOGY.md §5 + Compliance framing、(3) ローカル先行・プロバイダー非依存 = docs/DESIGN_RAG_KG.md §1.4、(4) 読取専用源 + 派生著作物 = docs/DESIGN_RAG_KG.md §1.4。

  # ─────────────────────────────────────────────
  # 2. 全体構成
  # 引用源: S-1 §2 (7 工程) + S-9 (INDEX.md) + S-5 (restructure_plan.md) +
  #         S-3 + S-4 (検証 schema) + S-11 (Phase 6.5) + S-2 (Phase 7 設計仕様)
  # ─────────────────────────────────────────────
  - name: "2_全体構成"
    type: "text"
    content_summary: "システム全体像・4 サブシステム (知識ベース本体・検証パイプライン・AI 平台展開・Phase 7 RAG+KG)・サブシステム間関係"
    content: |
      2.1 システム全体像

      本システムは、CDISC 公式刊行物を唯一の根拠とする 4 サブシステムで構成される。知識ベース本体を共通の読取専用源として、検証パイプラインが品質を担保し、AI 平台展開が業務利用を可能にする。Phase 7 RAG+KG は知識ベースを入力源として高度な検索・確認機能を提供する予定である (設計済・実装未着手)。

      システムの状態区分は以下のとおりである。
      ・知識ベース本体 — 現行運用中
      ・検証パイプライン — 現行運用中 (対象範囲 97% 完了 (METHODOLOGY.md §2 末尾段落)、継続中)
      ・AI 平台展開 — Phase 6.5 完了、現行運用中 (リリース版 v1.0)
      ・Phase 7 RAG+KG — 設計確定、実装未着手

      出典: METHODOLOGY.md §2 + docs/DESIGN_RAG_KG.md §2 + ai_platforms/release/v1.0/。

      2.2 知識ベース本体

      知識ベース本体 (knowledge_base/) は、CDISC 公式刊行物 4 種から 7 工程パイプラインで抽出・再構成した 293 件の Markdown ファイル群である。以下の 5 層で構成される。

      (1) ドメイン層 (knowledge_base/domains/) — 63 ドメイン × 3 件 = 189 ファイル。各ドメインは spec.md (変数仕様、SDTMIG xlsx 源)・assumptions.md (業務上の前提、PDF 源)・examples.md (実装例、PDF 源) の 3 件パターンで構成される。

      (2) 章節層 (knowledge_base/chapters/) — SDTMIG v3.4 の共通章 6 件 (ch01_introduction.md / ch02_fundamentals.md / ch03_submitting_data.md / ch04_general_assumptions.md / ch08_relationships.md / ch10_appendices.md)。ch05〜ch07 および ch09 はドメイン各論章であり SDTMIG v3.4 の章番号体系に準拠した不連続選択である。各ファイルの先頭に PDF 頁範囲を付与し、SDTMIG 目次と直接対応する。

      (3) モデル層 (knowledge_base/model/) — SDTM Model v2.0 の概念モデル 6 件 (concepts_and_terms.md 他)。観察クラス・変数役割・特殊目的ドメイン・関連データセットの設計概念を収録する。

      (4) 受控用語層 (knowledge_base/terminology/) — CDISC 受控用語 (Controlled Terminology) xlsx 2024 年版から生成。1,005 のコードリスト・37,939 用語を三層 (core/ / questionnaires/ / supplementary/) に分類する。各コードリスト文書に CDISC 割当の C 符号 (例: C66731) を保持し、米国国立がん研究所 EVS Browser (NCI EVS Browser) との相互参照を可能とする。terminology/ 配下のファイル数は 91 件である。

      (5) 索引層 — INDEX.md (全 293 ファイルのクイックリファレンス、主索引として 1 件扱い) + ROUTING.md (問題種別別参照経路の経路層文書) + VARIABLE_INDEX.md (1,523 変数の逆引き索引)。なお、公式合計 293 件の内訳は「INDEX.md では索引を 1 件として計上」する方式であり、3 ファイルの物理的存在とは区別する。

      5 層の合計: 189 (ドメイン層) + 91 (受控用語層) + 6 (モデル層) + 6 (章節層) + 1 (主索引) = 293 件 (knowledge_base/INDEX.md l.4 の公式合計と一致)。

      出典: knowledge_base/INDEX.md + .work/00_planning/restructure_plan.md §三 + METHODOLOGY.md §3。

      2.3 検証パイプライン

      検証パイプラインは、知識ベース本体の各記述を出典 PDF と頁単位で字面照合する独立工程である。7 工程パイプラインと並行して継続実施されており、本書執筆時点で対象範囲の 97% を完了している。

      工程は以下の 3 段階で構成される。

      (1) 検証単位抽出 — PDF 原子および MD 原子を検証単位データ schema (atom_schema v1.2 凍結済) に従い抽出する。PDF 原子は atom_id 形式 <source_short>_p<NNN>_a<NNN> (例: ig34_p0425_a012) で識別する。MD 原子は md_<file_stem>_a<NNN> (例: md_ch08_a042) で識別する。atom_type は HEADING / SENTENCE / LIST_ITEM / TABLE_HEADER / TABLE_ROW / CODE_LITERAL / CROSS_REF / FIGURE / NOTE の 9 値硬列挙型である。

      (2) 突合判定 — 突合管理表データ schema (ledger_schema v1.2 凍結済) に従い、各検証単位について突合管理表の 1 行 JSONL として記録する。順方向 (PDF→MD) の verdict は 9 値 (EXACT / EQUIVALENT / EDITORIAL_CORRECTION / TABLE_SIMPLIFIED / PARTIAL / MISPLACED / ERROR / MISSING / INTENTIONAL_EXCLUDE)、逆方向 (MD→PDF) の verdict は 5 値 (SOURCED / EDITORIAL_ADDITION / SYNTHESIZED / UNSOURCED / HALLUCINATED) である。類似度スコア (similarity_score) は 0.0〜1.0 の範囲で、PARTIAL は 0.50 以上、SOURCED は 0.50 以上が必須条件である。

      (3) 独立二次審査 — 審査独立性原則に従い、整合確認担当者とは異なる主体が審査記録 (audited_by 配列) に CONFIRM / OVERRIDE / AMBIGUOUS を追記する。

      出典: .work/06_deep_verification/schema/atom_schema.json + .work/06_deep_verification/schema/ledger_schema.json + METHODOLOGY.md §2 末尾段落。

      2.4 AI 平台展開 (Phase 6.5 完了)

      AI 平台展開は、知識ベース本体を 4 種の AI 平台向け配布物として整形したものである。Phase 6.5 として完了し、リリース版 v1.0 として運用中である。

      4 平台の概要は以下のとおりである。

      ・ChatGPT GPTs (v2.2 LIVE) — 20 ファイル上限に整合した結合ファイル構成。ドメイン仕様・受控用語・章節を統合した参照ツール。
      ・Google Gemini Gems (v7.1 LIVE) — 大きなコンテキストウィンドウを活用した 4 ファイル積極結合構成。幻覚防止プロンプトを v7.1 で強化済。
      ・Google NotebookLM — 42 ソース構成 (上限 50 のうち 42 使用)。知識ベース内のソースのみに限定した高精度参照モデル。
      ・Anthropic Claude Projects (v2.6) — 19 ファイル構成 (容量約 77%、約 1.29M トークン使用)。QS コードリスト展開率 約 55.8% (KNOWN_LIMITATIONS.en.md L1 計測)。

      各平台は容量制約・機能制約に整合させた配布物として再パッケージされており、既知の限界は ai_platforms/release/v1.0/KNOWN_LIMITATIONS.en.md に一覧化されている。

      出典: ai_platforms/release/v1.0/ + METHODOLOGY.md §2 Phase 6.5。

      2.5 Phase 7 RAG+KG (設計済・実装未着手)

      Phase 7 RAG+KG は、知識ベースを入力源とした二段階インテリジェント検索・確認システムの設計仕様である。設計は確定しているが、実装は未着手である。本書での扱いは設計書面のみであり、実装到達は別工程による。

      二段階ロードマップは以下のとおりである。

      Phase 7 第 1 段階 (RAG + データセット確認): 検索拡張生成 (RAG) パイプラインとして、Markdown ファイルをチャンク化して Chroma ベクトル DB に格納し、LiteLLM 抽象層経由で Claude / GPT 他の LLM を呼び出す。Streamlit インタフェースで意味的質問応答とデータセット確認レポートを提供する設計。前提: 既存の 293 件 Markdown ファイルを利用可能。

      Phase 7 第 2 段階 (KG + 混合経路): 知識グラフ (KG) として Neo4j にノード・リレーションを投入し、Cypher クエリにより横断参照・影響範囲分析を可能にする。意図分類器によりベクトル検索経路・グラフ検索経路・混合経路を自動選択する設計。前提: P3 構造化メタデータ (knowledge_base/domains/<DOMAIN>/meta.yaml) の自動生成スクリプト (docs/DESIGN_RAG_KG.md §5.1 設計済) による出力が完了していること。本書執筆時点で当該生成スクリプトの実装および meta.yaml 出力は未実施。

      全コンポーネントは Docker Compose によるローカル実行を前提とし、クラウド展開は本設計範囲外である。

      出典: docs/DESIGN_RAG_KG.md §2 + §7。

      2.6 サブシステム間の関係

      各サブシステムの入力・出力関係は以下のとおりである。

      知識ベース本体は、すべてのサブシステムの共通読取専用源である。変更不可の入力として扱い、派生著作物側のみで改修を行う。

      検証パイプラインは、knowledge_base/ を入力とし、突合管理表 (JSONL 形式) および根拠資料を .work/06_deep_verification/ 配下に出力する。知識ベースの品質を支える独立した工程として機能する。

      AI 平台展開は、知識ベースを容量制約・機能制約に整合させた配布物に再パッケージしたものである。知識ベース本体を参照するが、改変はしない。

      Phase 7 RAG+KG は、knowledge_base/ を入力源として意味的検索・グラフ横断クエリ・データセット確認機能を提供する予定である (実装未着手)。ベクトル DB (Chroma) およびグラフ DB (Neo4j) は独立プロジェクトとして別ディレクトリ (sdtm-rag/) で保持する設計。knowledge_base/ を読取専用源とし、本ディレクトリは sdtm-rag/ に派生する。

      出典: METHODOLOGY.md §3 + docs/DESIGN_RAG_KG.md §1.4。

