    type: "text"
    content: |
      本書は build_xlsx.py の動作確認用サンプル文書である。
      本スクリプトは yml 形式の入力ファイルを読み込み、表紙・改訂履歴・目次・本文シート・承認欄を備えた xlsx ファイルを生成する。
      生成された xlsx は PLAN §3.1 に定める配色・フォント・セル書式に完全準拠する。

