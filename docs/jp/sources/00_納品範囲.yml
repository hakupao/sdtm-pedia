  - name: "3_進捗概況"
    type: "text"
    content_summary: "本中間版時点での進捗概況"
    content: |
      3.1 受信者向け納品文書 進捗

      最優先 4 件 (第 1 段階) のうち 2 件 (要件定義書 / 基本設計書) が確定状態であり, 進捗率は 50% である。8 件全体では確定 2 件 + 骨格 1 件 (用語集) + 中間 / 補助 2 件 (進捗報告書 / 反復実績記録) で進捗率は約 28% である。

      3.2 用語規律監査 結果

      確定済 2 件 (要件定義書 / 基本設計書) は, 内部用語使用禁止リスト (33 項目) に対する機械検査でヒット 0 件である。本中間版同梱の進捗報告書 (07) / 反復実績記録 (08) / 納品範囲案内 (00, 本書) も同条件で確認済である。

      3.3 反復実績概況

      本知識ベース整備全期間 (2026-04-13 〜 2026-04-30, 約 18 日間) で実施した反復総数は 50 回次相当である。詳細は同梱の反復実績記録 (08) を参照されたい。

      3.4 詳細

      工程別進捗 / 課題管理 / 今後の予定の詳細は, 同梱の進捗報告書 (07) を参照されたい。

