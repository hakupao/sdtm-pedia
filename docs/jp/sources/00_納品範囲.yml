  - name: "1_本納品の位置づけ"
    type: "text"
    content_summary: "中間版 (v0.5) としての位置づけ + 正式版予定"
    content: |
      1.1 本納品の位置づけ

      本 zip パッケージは, iTMS 株式会社向け納品ドキュメント整備作業の中間版 (v0.5) である。最優先 4 件中 2 件 (要件定義書 / 基本設計書) を確定状態 (v1.0) でお送りし, 残 5 件は仕上げ段階で順次お送りする予定である。

      本中間版は受信者側で先行内容確認 (要件定義書および基本設計書) ができるよう先行提出するものであり, 残工程の進行と並行して受信者側からのご意見を反映できる体制とする。

      1.2 正式版 v1.0 一括提出予定

      正式版 v1.0 の一括提出は, 全 8 件全て v1.0 確定 + 集約後の 2026 年 5 月中旬末を予定する。詳細日程は §4 残工程予定を参照されたい。

      1.3 本書の構成

      本書は本中間版の同梱物および位置づけを Excel 形式で案内する。シート構成は以下の通りである。

       - シート 1 (本書): 本納品の位置づけ + 正式版予定
       - シート 2: 同梱物一覧
       - シート 3: 進捗概況
       - シート 4: 残工程予定
       - シート 5: ご確認いただきたい事項
       - シート 6: 連絡先

      なお本中間版に同梱する 4 件の Excel は, 弊社の開発過程で 50 回次相当の独立確認担当による検査循環を経て確定した内容である。詳細は同梱の反復実績記録 (08) を参照されたい。

