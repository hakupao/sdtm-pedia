  - name: "5_ご確認いただきたい事項"
    type: "text"
    content_summary: "受信者側にてご確認いただきたい事項一覧"
    content: |
      5.1 受信者側ネイティブ確認担当の指名

      本中間版閲覧後でかまいません。正式版 v1.0 提出前に, 受信者側で日本語ネイティブの確認担当者をご指名いただきたい。本指名は, 弊社の独立確認担当による検査では完全には保証できない日本語の自然さの最終確認を目的とする。

      5.2 同梱 Excel ファイル 5 件 (00 / 01 / 04 / 07 / 08) の読み込み確認

      ご使用予定環境にて, 同梱の 5 件の xlsx ファイルが正常に開けることをご確認いただきたい。推奨環境: Microsoft Excel 2019 以降 (印刷形式は A4 縦に対応する標準書式で作成済)。

      5.3 用語選定 + 文書構成へのご意見

      採用前のフィードバックがあれば残工程に反映可能である。本中間版に対するご意見の受領期限は 2026-05-06 を目安とし, 同日以降の指摘は正式版 v1.0 の対応範囲外として記録する。

      5.4 同梱の参考資料 (公開発布版) のご確認

      公開発布版資料 (ai_platforms_release_v1.0/) は受信者側で社内共有可能なレベルで作成している。本中間版同梱は内容紹介を目的とするものであり, 既に公開済の内容と同一である。

