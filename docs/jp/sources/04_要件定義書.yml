      - ["FR-09", "章節回答追跡機能", "章節レベルの主張について、knowledge_base/chapters/chXX_*.md の頁範囲および節番号が、SDTMIG 目次と直接対応する構造を提供する。", "METHODOLOGY.md §3 第 2 段落"]
      - ["FR-10", "受控用語追跡機能", "knowledge_base/terminology/ 配下の各コードリスト文書に CDISC 割当の C 符号 (例 C66731) を保持し、米国国立がん研究所 EVS Browser (NCI EVS Browser) との相互参照を可能とする。", "METHODOLOGY.md §3 第 3 段落"]
      - ["FR-11", "字面級確認継続実施機能", "七工程パイプラインと並行し、知識ベースの字面級確認を独立した作業群として継続実施する。各検証単位の主張を出典 PDF と頁単位で照合する。2026 年 4 月 29 日時点で対象範囲の 97% を完了し、進行中である。", "METHODOLOGY.md §2 末尾段落"]

