  - name: "2_業務要件"
    type: "text"
    content_summary: "業務上の要件 — 本知識ベースが満たすべき業務的価値"
    content: |
      2.1 業務シナリオ

      本知識ベースは、以下三用途における作業参照資料として用いることを業務要件とする。

      ・SDTM データプログラミング: 各ドメインの変数定義、Core 区分、受控用語との照合を日常参照する場面。
      ・マッピング品質確認: 提出予定データセットを SDTMIG v3.4 仕様と照合し、不整合を抽出する場面。
      ・SDTM 教育: 規格初学者および中堅技術者が、ドメイン構造、観察クラス概念、受控用語体系を学習する場面。

      出典: METHODOLOGY.md §6 first bullet。

      2.2 一次資料との対応関係

      本知識ベースは、CDISC が公表する以下四種の公式刊行物のみを根拠とする。第三者要約や言換え版から派生したコンテンツを一切含まない。

      ・SDTM 実装ガイド (SDTMIG: SDTM Implementation Guide) PDF v3.4 (2021 年 11 月 29 日公表)、461 頁。各ドメインの仕様、業務上の前提、実装例を収録する。
      ・SDTM モデル (SDTM Model) PDF v2.0 Final (2021 年 11 月 29 日公表)、74 頁。観察クラスおよび変数役割の概念モデルを規定する。
      ・SDTMIG xlsx v3.4。63 ドメインにわたる 1,917 変数の構造化メタデータを含む。
      ・CDISC 受控用語 (Controlled Terminology) xlsx 2024 年版。1,005 のコードリスト、合計 37,939 用語を含む。

      原刊行物自体は本リポジトリに再配布せず、CDISC が著作権を保持する。

      出典: METHODOLOGY.md §1 Table。

      2.3 業務的限界

      本知識ベースは作業参照資料としての性質を有し、以下二点の業務的限界を本書冒頭で明示する。

      第一に、本知識ベースは、米国 21 CFR Part 11 または PMDA が想定する電子記録および電子署名要件を充足する電磁的記録の代替ではない。組織標準作業手順書がこれら電子記録について規定する場合、その規定が優先される。

      第二に、規制当局への提出時の権威源は CDISC 公式刊行物であり、本知識ベースの記述と公式刊行物との間に差異が見られた場合は、公式刊行物が優先される。

      出典: METHODOLOGY.md §6 (last 2 bullets)。

