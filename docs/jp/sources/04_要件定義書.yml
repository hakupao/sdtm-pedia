  - name: "1_背景目的"
    type: "text"
    content_summary: "本書の背景・目的・想定読者・関連文書"
    content: |
      1.1 本知識ベース (SDTM Knowledge Base) の存在意義

      本知識ベースは、米国食品医薬品局 (FDA: Food and Drug Administration) が義務付け、独立行政法人医薬品医療機器総合機構 (PMDA: Pharmaceuticals and Medical Devices Agency) が認め、欧州医薬品庁 (EMA: European Medicines Agency) が受理する臨床試験データ表形式モデル (SDTM: Study Data Tabulation Model) の標準刊行物に基づき、業務利用しやすい形に再構成した参考資料である。

      対象は、CDISC SDTM 規格に依拠する臨床試験データ提出、データプログラミング、品質確認業務である。本知識ベースは、これら業務における日常参照を効率化することを目的とし、規制当局への提出時の権威源を代替するものではない。

      出典: METHODOLOGY.md Purpose + Compliance framing。

      1.2 本納品物の目的

      本納品物 (要件定義書、基本設計書、運用保守マニュアル、テスト結果報告書、詳細設計書、トレーサビリティ管理表、進捗報告書、用語集) は、本知識ベースおよびその検証根拠資料を、iTMS 株式会社が自社業務に違和感なく組み込めるよう、日本職場の標準ドキュメント形式 (Excel 主体) に再構成したものである。

      Excel 形式を主体に選定した理由は、受信者側の社内文書レビュー、印刷、承認欄記入といった既存業務手順との適合性が高いためである。

      出典: docs/jp/PLAN.md §0.1。

      1.3 想定読者

      本納品物の想定読者は、IT 分野および医療データ分野の双方に知見を有する実務担当者である。具体的には、臨床試験データ管理、SDTM データプログラミング、マッピング品質確認、SDTM 教育に従事する技術者および管理者を想定する。

      出典: docs/jp/PLAN.md §0 受信者欄。

      1.4 関連文書一覧

      本納品物は以下の文書群で構成される。

      ・01 基本設計書: 知識ベース全体構成、データモデル、外部 IF を定義する設計根拠章。
      ・02 運用保守マニュアル: 日常運用手順、保守作業手順、障害対応の運用根拠章。
      ・03 テスト結果報告書: 試験範囲、実施結果、合格判定、根拠資料一覧の検証根拠章。
      ・04 要件定義書: 本書。背景、業務要件、機能要件、非機能要件、制約条件、前提条件の最上位根拠章。
      ・05 詳細設計書: 01 基本設計の章別詳細展開。
      ・06 トレーサビリティ管理表: 要件、設計、試験、根拠資料の横断対応表。
      ・07 進捗報告書: 全体サマリ、工程別進捗、課題管理、今後の予定。
      ・99 用語集: 英語、日本語、中国語、出典規格の四列対照辞書。

      出典: docs/jp/PLAN.md §1。

      1.5 本書の位置付け

      本書は本納品物の最上位根拠章であり、後段三文書 (01 基本設計書、02 運用保守マニュアル、03 テスト結果報告書) すべての根拠章となる。01 は本書 §3 機能要件を、02 は本書 §4 非機能要件および §5 制約条件を、03 は本書 §6 前提条件を引用して試験範囲を画定する。

      出典: docs/jp/PLAN.md §1 v0.3 改訂注記。

      出典: METHODOLOGY.md Purpose + Compliance framing / docs/jp/PLAN.md §0 §1。

