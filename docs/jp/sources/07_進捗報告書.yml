revisions:
  - version: "v0.5"
    date: "2026-04-30"
    content: "中間版作成. 受信者向け納品候補 7 件中 2 件 (要件定義書 / 基本設計書) を確定し, 残 5 件 (運用保守マニュアル / 試験結果報告書 / 詳細設計書 / トレーサビリティ管理表 / 用語集 完成版) の予定を整理. 用語集は骨格のみ (中国語列充填は仕上げ段階で実施)."
