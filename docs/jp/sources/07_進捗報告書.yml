sheets:

  # ─────────────────────────────────────────────
  # 1. 全体サマリ
  # ─────────────────────────────────────────────
  - name: "1_全体サマリ"
    type: "text"
    content_summary: "本中間版の位置づけ・主要マイルストーン・全体進捗"
    content: |
      1.1 本報告書の位置づけ

      本書は, iTMS 株式会社向け納品ドキュメント整備作業 (以下「本作業」と表記する) の進捗を中間段階で報告するものである。納品形式は Excel (.xlsx) を主体とし, 受信者向け文書 7 件 + 用語集 1 件 = 計 8 件を整備対象とする。

      本中間版 (v0.5) では, 工程順序の根拠となる先頭 2 件 (要件定義書 / 基本設計書) を確定状態 (v1.0) で提出する。残 5 件は仕上げ段階 (2026-05-初旬 - 中旬) で順次提出予定である。

      出典: docs/jp/PLAN.md §0 + §1 文書一覧。

      1.2 主要マイルストーン

      下表に主要マイルストーンを示す。

       - 2026-04-29: 基本骨格構築 (第 0 段階) 完了
       - 2026-04-29: 用語調研 (第 0.5 段階) 完了 (用語写像辞書 v0.3 を独立確認 3 回で確定)
       - 2026-04-29: Excel 基盤構築 (第 0.7 段階) 完了 (スタイル指針 / 表紙統一様式 / 生成処理)
       - 2026-04-29: 要件定義書 v1.0 確定 (第 1 段階 第 1 着手)
       - 2026-04-29: 基本設計書 v1.0 確定 (第 1 段階 第 2 着手)
       - 2026-04-30: 中間版進捗報告書 v0.5 作成 + 中間提出
       - 2026-05-初旬 (予定): 運用保守マニュアル / 試験結果報告書 v1.0 (並列着手)
       - 2026-05-中旬 (予定): 詳細設計書 / トレーサビリティ管理表 / 用語集 完成版 v1.0
       - 2026-05-中旬末 (予定): 全 8 件集約 + 正式版 v1.0 提出

      出典: docs/jp/PLAN.md §5 Phase 計画 + 本書 §2 工程別進捗。

      1.3 全体進捗概況

      最優先 4 件 (第 1 段階) のうち 2 件を確定し, 進捗率は 50% である。8 件全体では確定 2 件 + 骨格 1 件 (用語集) で進捗率は約 28% である。

      用語規律 (受信者向け文書での内部用語使用禁止) は機械検査 (使用禁止語検査 + 採用語整合検査) と独立確認担当の人手判定の双方で確認しており, 確定済 2 件 (要件定義書 / 基本設計書) は使用禁止語ヒット 0 件である。

      出典: docs/jp/glossary/research_reports/phase_1_04_term_audit_2026-04-29.md + phase_1_01_term_audit_2026-04-29.md。

      1.4 本中間版の同梱物

      本中間版 (zip パッケージ) には以下を同梱する。

       - 04 要件定義書.xlsx (確定版 v1.0)
       - 01 基本設計書.xlsx (確定版 v1.0)
       - 07 進捗報告書.xlsx (本書, 中間版 v0.5)
       - 99 用語集.xlsx (骨格版 v0.1, 中国語列は仕上げ段階で充填)
       - 公開発布版資料 (ai_platforms/release/v1.0/) — 方法論・利用案内・既知制限事項を 3 言語で収録した参考資料

      出典: docs/jp/deliverable/README_今回納品範囲.md。

